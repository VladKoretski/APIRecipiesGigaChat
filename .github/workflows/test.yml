name: 🧪 Test & Lint

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: 🐍 Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov flake8
    
    - name: 🔍 Lint with flake8
      run: |
        # Останавливаем сборку только на критических ошибках
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Предупреждения просто показываем
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: 🔐 Check for secrets in code
      run: |
        # Простая проверка: нет ли явных ключей в коде
        ! grep -r "GIGACHAT_.*=.*[a-zA-Z0-9]\{20,\}" --include="*.py" . || \
        (echo "❌ Возможная утечка секрета в коде!" && exit 1)
    
    - name: 🧪 Run unit tests
      run: |
        pytest tests/ -v --cov=llm --cov-report=term-missing
    
    - name: 📊 Upload coverage
      uses: codecov/codecov-action@v3
      if: success()
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
